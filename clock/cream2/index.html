<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>墨韵时钟 - Ink Clock</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main id="app" class="app" aria-label="Clock overlay">
      <div id="widget" class="widget" aria-label="Clock widget">
        <div class="panel-scaler">
          <!-- Ink splash background container -->
          <div class="splash-container">
            <canvas id="splashCanvas" class="splash-canvas" width="500" height="500"></canvas>
          </div>
          
          <section class="panel" aria-label="Clock face">
            <!-- Ink seal decorations -->
            <div class="ink-seal top-seal"></div>
            
            <div class="clock-digital" id="clockDigital">
              <div class="time" id="time" aria-label="Time">--:--</div>
            </div>

            <canvas
              class="clock-analog"
              id="clockAnalog"
              width="280"
              height="280"
              aria-label="Analog clock"
            ></canvas>

            <div class="date" id="date" aria-label="Date"></div>

            <!-- Ink seal decoration -->
            <div class="ink-seal bottom-seal"></div>

            <button
              id="settingsToggle"
              class="settings-toggle"
              type="button"
              aria-label="Open settings"
              title="Settings (Ctrl+,)"
            >⚙</button>
          </section>
        </div>

        <section id="settings" class="settings" aria-label="Settings" hidden>
          <header class="settings-header">
            <div class="settings-title">墨韵时钟 · Ink Clock</div>
            <button id="closeSettings" class="icon-btn" type="button" aria-label="Close settings">✕</button>
          </header>

          <div class="settings-grid">

            <label class="row">
              <span>Analog clock</span>
              <input id="optAnalog" type="checkbox" />
            </label>

            <label class="row">
              <span>24-hour format</span>
              <input id="opt24h" type="checkbox" />
            </label>

            <label class="row">
              <span>Show seconds</span>
              <input id="optSeconds" type="checkbox" checked />
            </label>

            <label class="row">
              <span>Show date</span>
              <input id="optDate" type="checkbox" checked />
            </label>

            <label class="row">
              <span>Scale</span>
              <input id="optScale" type="range" min="0.5" max="2.5" step="0.1" value="0.9" />
            </label>

            <label class="row">
              <span>Opacity</span>
              <input id="optOpacity" type="range" min="0" max="1" step="0.05" value="0.35" />
            </label>

            <label class="row">
              <span>Blur</span>
              <input id="optBlur" type="range" min="0" max="30" step="1" value="10" />
            </label>

            <label class="row">
              <span>Corner radius</span>
              <input id="optCornerRadius" type="range" min="0" max="120" step="1" value="20" />
            </label>

            <label class="row">
              <span>Text color</span>
              <input id="optText" type="color" value="#1a1a1a" />
            </label>

            <label class="row">
              <span>Accent color</span>
              <input id="optAccent" type="color" value="#d4583f" />
            </label>

          </div>

          <div class="actions">
            <button id="reset" type="button">Reset</button>
          </div>

          <div class="hint">Changes are saved automatically.</div>

        </section>
      </div>
    </main>
  </body>
</html>
